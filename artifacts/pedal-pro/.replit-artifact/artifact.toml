kind = "web"
previewPath = "/"
title = "Pedal Pro"
version = "1.0.0"
id = "artifacts/pedal-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22677

[services.development]
run = "pnpm --filter @workspace/pedal-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pedal-pro", "run", "build" ]
publicDir = "artifacts/pedal-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22677"
BASE_PATH = "/"
